# LLM Data Generator Configuration
# Copy this file to config.local.yaml and add your API keys

# Output settings
output:
  data_dir: "./data"
  query_file: "queries.jsonl"
  response_file: "responses.jsonl"
  append_mode: true  # Set to false to overwrite existing files

# Default model settings
default:
  temperature: 1.0
  max_tokens: 2048
  top_p: 1.0

# Model configurations
# You can define multiple models here and use them by name
models:
  # OpenAI models
  gpt-4:
    provider: "openai"
    model_name: "gpt-4"
    api_key: "${OPENAI_API_KEY}"  # Set via environment variable

  gpt-4-turbo:
    provider: "openai"
    model_name: "gpt-4-turbo-preview"
    api_key: "${OPENAI_API_KEY}"

  gpt-3.5-turbo:
    provider: "openai"
    model_name: "gpt-3.5-turbo"
    api_key: "${OPENAI_API_KEY}"

  # Anthropic models
  claude-3-opus:
    provider: "anthropic"
    model_name: "claude-3-opus-20240229"
    api_key: "${ANTHROPIC_API_KEY}"

  claude-3-sonnet:
    provider: "anthropic"
    model_name: "claude-3-sonnet-20240229"
    api_key: "${ANTHROPIC_API_KEY}"

  claude-3-haiku:
    provider: "anthropic"
    model_name: "claude-3-haiku-20240307"
    api_key: "${ANTHROPIC_API_KEY}"

  # Google models
  gemini-pro:
    provider: "google"
    model_name: "gemini-pro"
    api_key: "${GOOGLE_API_KEY}"

  gemini-2.5-pro:
    provider: "google"
    model_name: "gemini/gemini-2.5-pro"  # Gemini 2.5 Pro (March 2025)
    api_key: "${GOOGLE_API_KEY}"

  gemini-2.5-pro-exp:
    provider: "google"
    model_name: "gemini/gemini-2.5-pro-exp-03-25"  # Gemini 2.5 Pro Experimental
    api_key: "${GOOGLE_API_KEY}"

  gemini-2.5-flash:
    provider: "google"
    model_name: "gemini/gemini-2.5-flash"  # Gemini 2.5 Flash (faster, lighter)
    api_key: "${GOOGLE_API_KEY}"

  # Local models via vLLM/TGI server (OpenAI-compatible API)
  # See LOCAL_MODEL_GUIDE.md for setup instructions

  local-llama:
    provider: "openai"  # vLLM/TGI provides OpenAI-compatible API
    model_name: "meta-llama/Meta-Llama-3.1-8B-Instruct"  # Use your actual model path
    api_base: "http://localhost:8000/v1"  # vLLM default port
    api_key: "EMPTY"  # Local server doesn't need real API key

  local-qwen:
    provider: "openai"
    model_name: "Qwen/Qwen2.5-7B-Instruct"
    api_base: "http://localhost:8000/v1"
    api_key: "EMPTY"

  # HuggingFace models (via API)
  # Note: Using Serverless Inference API (free tier with limits)
  # For production, consider using Inference Endpoints (paid)

  # Small models (more likely to work on free tier)
  gpt2:
    provider: "huggingface"
    model_name: "huggingface/gpt2"
    api_key: "${HUGGINGFACE_API_KEY}"

  distilgpt2:
    provider: "huggingface"
    model_name: "huggingface/distilgpt2"
    api_key: "${HUGGINGFACE_API_KEY}"

  # Llama models (may require Pro subscription or Inference Endpoints)
  llama2-hf:
    provider: "huggingface"
    model_name: "huggingface/meta-llama/Llama-2-7b-chat-hf"
    api_key: "${HUGGINGFACE_API_KEY}"

  llama3.2-1b:
    provider: "huggingface"
    model_name: "huggingface/meta-llama/Llama-3.2-1B-Instruct"
    api_key: "${HUGGINGFACE_API_KEY}"

  llama3-8b:
    provider: "huggingface"
    model_name: "huggingface/meta-llama/Meta-Llama-3-8B-Instruct"
    api_key: "${HUGGINGFACE_API_KEY}"

  llama3.1-8b:
    provider: "huggingface"
    model_name: "huggingface/meta-llama/Llama-3.1-8B-Instruct"  # Latest Llama 3.1 8B (128K context)
    api_key: "${HUGGINGFACE_API_KEY}"

  # Azure OpenAI
  azure-gpt-4:
    provider: "azure"
    model_name: "azure/gpt-4"
    api_key: "${AZURE_API_KEY}"
    api_base: "${AZURE_API_BASE}"
    api_version: "2024-02-15-preview"

# Batch processing settings
batch:
  enable: false
  batch_size: 10
  delay_between_batches: 1.0  # seconds

# Retry settings
retry:
  max_retries: 3
  retry_delay: 2.0  # seconds
  exponential_backoff: true
